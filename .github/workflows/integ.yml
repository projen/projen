name: integ
on:
  pull_request: {}
  workflow_dispatch: {}
  merge_group: {}
jobs:
  integ-node:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      CI: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          package-manager-cache: false
      - name: Install dependencies
        run: npm ci
      - name: Compile
        run: node ./projen.js compile
      - name: Bundle task runner
        run: node ./projen.js bundle:task-runner
      - name: Package js
        run: node ./projen.js package:js
      - name: Install harness
        run: node ./projen.js integ:install
      - name: Run node suite
        run: node ./projen.js integ:node
      - name: Run eject suite
        run: node ./projen.js integ:eject
      - name: Run snapshot suite
        run: node ./projen.js integ:snapshot
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        node-version:
          - lts/-2
          - lts/-1
          - lts/*
  integ-python:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      CI: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          package-manager-cache: false
      - name: Install dependencies
        run: npm ci
      - name: Compile
        run: node ./projen.js compile
      - name: Package python
        run: node ./projen.js package:python
      - name: Install harness
        run: node ./projen.js integ:install
      - name: Run python suite
        run: node ./projen.js integ:python
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
  integ-java:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      CI: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: corretto
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          package-manager-cache: false
      - name: Install dependencies
        run: npm ci
      - name: Compile
        run: node ./projen.js compile
      - name: Package java
        run: node ./projen.js package:java
      - name: Install harness
        run: node ./projen.js integ:install
      - name: Run java suite
        run: node ./projen.js integ:java
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
  integ-go:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      CI: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          package-manager-cache: false
      - name: Install dependencies
        run: npm ci
      - name: Compile
        run: node ./projen.js compile
      - name: Package go
        run: node ./projen.js package:go
      - name: Install harness
        run: node ./projen.js integ:install
      - name: Run go suite
        run: node ./projen.js integ:go
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
  integ:
    needs:
      - integ-node
      - integ-python
      - integ-java
      - integ-go
    runs-on: ubuntu-latest
    permissions: {}
    if: always()
    steps:
      - name: integ-node result
        run: echo ${{ needs.integ-node.result }}
      - name: integ-python result
        run: echo ${{ needs.integ-python.result }}
      - name: integ-java result
        run: echo ${{ needs.integ-java.result }}
      - name: integ-go result
        run: echo ${{ needs.integ-go.result }}
      - name: Set status based on integ tests
        if: ${{ needs.integ-node.result != 'success' || needs.integ-python.result != 'success' || needs.integ-java.result != 'success' || needs.integ-go.result != 'success' }}
        run: exit 1
