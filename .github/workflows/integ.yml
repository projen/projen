# ~~ Generated by projen. To modify, edit .projenrc.ts and run "node ./projen.js".

name: integ
on:
  pull_request: {}
  workflow_dispatch: {}
  merge_group: {}
jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CI: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: corretto
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          package-manager-cache: false
      - name: Install dependencies
        run: npm ci
      - name: Compile
        run: node ./projen.js compile
      - name: Bundle task runner
        run: node ./projen.js bundle:task-runner
      - name: Package all languages
        run: node ./projen.js package-all
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: integ-build-artifact
          path: dist
          overwrite: true
  integ-test:
    name: ${{ matrix.suite }} / ${{ matrix.os }} / node ${{ matrix.node-version }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      CI: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - if: matrix.suite == 'python'
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - if: matrix.suite == 'java'
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: corretto
      - if: matrix.suite == 'go'
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          package-manager-cache: false
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: integ-build-artifact
          path: dist
      - name: Install harness
        run: npm ci
        working-directory: integ
      - name: Run suite
        run: npx jest ${{ matrix.file }} --ci
        working-directory: integ
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: node
            file: tests/node-typescript.integ.test.ts
          - suite: eject
            file: tests/eject.integ.test.ts
          - suite: snapshot
            file: tests/projenrc-snapshot.integ.test.ts
          - suite: python
            file: tests/python.integ.test.ts
          - suite: java
            file: tests/java.integ.test.ts
          - suite: go
            file: tests/go.integ.test.ts
        exclude:
          - suite: python
            node-version: lts/-2
          - suite: python
            node-version: lts/-1
          - suite: java
            node-version: lts/-2
          - suite: java
            node-version: lts/-1
          - suite: go
            node-version: lts/-2
          - suite: go
            node-version: lts/-1
        os:
          - ubuntu-latest
          - windows-latest
        suite:
          - node
          - eject
          - snapshot
          - python
          - java
          - go
        node-version:
          - lts/-2
          - lts/-1
          - lts/*
  integ:
    needs: integ-test
    runs-on: ubuntu-latest
    permissions: {}
    if: always()
    steps:
      - name: integ-test result
        run: echo ${{ needs.integ-test.result }}
      - name: Set status based on integ tests
        if: ${{ needs.integ-test.result != 'success' }}
        run: exit 1
