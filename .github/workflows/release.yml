name: release
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run (skip actual publishing)
        required: false
        type: boolean
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      latest_commit: ${{ steps.git_remote.outputs.latest_commit }}
      tag_exists: ${{ steps.check_tag_exists.outputs.exists }}
    env:
      CI: "true"
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set git identity
        id: set_git_identity
        run: |-
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Setup Node.js
        id: setup_node_js
        uses: actions/setup-node@v6
        with:
          node-version: lts/-1
          package-manager-cache: false
      - name: Install dependencies
        id: install_dependencies
        run: npm ci
      - name: release
        id: release
        run: node ./projen.js release
      - name: Upload coverage to Codecov
        id: upload_coverage_to_codecov
        uses: codecov/codecov-action@v6
        with:
          directory: coverage
          use_oidc: true
      - name: Check if version has already been tagged
        id: check_tag_exists
        run: |-
          TAG=$(cat dist/releasetag.txt)
          ([ ! -z "$TAG" ] && git ls-remote -q --exit-code --tags origin $TAG && (echo "exists=true" >> $GITHUB_OUTPUT)) || (echo "exists=false" >> $GITHUB_OUTPUT)
          cat $GITHUB_OUTPUT
      - name: Check for new commits
        id: git_remote
        run: |-
          echo "latest_commit=$(git ls-remote origin -h ${{ github.ref }} | cut -f1)" >> $GITHUB_OUTPUT
          cat $GITHUB_OUTPUT
        shell: bash
      - name: Backup artifact permissions
        id: backup_artifact_permissions
        if: ${{ steps.git_remote.outputs.latest_commit == github.sha }}
        run: cd dist && getfacl -R . > permissions-backup.acl
        continue-on-error: true
      - name: Upload artifact
        id: upload_artifact
        if: ${{ steps.git_remote.outputs.latest_commit == github.sha }}
        uses: actions/upload-artifact@v7
        with:
          name: build-artifact
          path: dist
          overwrite: true
  release_github:
    name: Publish to GitHub Releases
    needs:
      - release
      - release_npm
      - release_maven
      - release_pypi
      - release_golang
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    environment: release
    if: needs.release.outputs.tag_exists != 'true' && needs.release.outputs.latest_commit == github.sha
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: lts/-1
          package-manager-cache: "false"
      - name: Download build artifacts
        id: download_build_artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifact
          path: dist
      - name: Restore build artifact permissions
        id: restore_build_artifact_permissions
        run: cd dist && setfacl --restore=permissions-backup.acl
        continue-on-error: true
      - name: Release
        id: release
        if: ${{ !inputs.dry_run }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: errout=$(mktemp); gh release create $(cat dist/releasetag.txt) -R $GITHUB_REPOSITORY -F dist/changelog.md -t $(cat dist/releasetag.txt) --target $GITHUB_SHA 2> $errout && true; exitcode=$?; if [ $exitcode -ne 0 ] && ! grep -q "Release.tag_name already exists" $errout; then cat $errout; exit $exitcode; fi
      - name: Extract Version
        id: extract-version
        if: ${{ failure() }}
        run: echo "VERSION=$(cat dist/version.txt)" >> $GITHUB_OUTPUT
        shell: bash
      - name: Create Issue
        id: create_issue
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.extract-version.outputs.VERSION }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: gh issue create --title "Publishing v$VERSION to GitHub Releases failed" --body "See $RUN_URL" --label "failed-release"
  release_npm:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      issues: write
    environment: release
    if: needs.release.outputs.tag_exists != 'true' && needs.release.outputs.latest_commit == github.sha
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          package-manager-cache: "false"
      - name: Download build artifacts
        id: download_build_artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifact
          path: dist
      - name: Restore build artifact permissions
        id: restore_build_artifact_permissions
        run: cd dist && setfacl --restore=permissions-backup.acl
        continue-on-error: true
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6
        with:
          path: .repo
      - name: Install Dependencies
        id: install_dependencies
        run: cd .repo && npm ci
      - name: Extract build artifact
        id: extract_build_artifact
        run: tar --strip-components=1 -xzvf dist/js/*.tgz -C .repo
      - name: Move build artifact out of the way
        id: move_build_artifact_out_of_the_way
        run: mv dist dist.old
      - name: Create js artifact
        id: create_js_artifact
        run: cd .repo && node ./projen.js package:js
      - name: Collect js artifact
        id: collect_js_artifact
        run: mv .repo/dist dist
      - name: Release
        id: release
        env:
          NPM_DIST_TAG: latest
          NPM_REGISTRY: registry.npmjs.org
          NPM_CONFIG_PROVENANCE: "true"
          NPM_TRUSTED_PUBLISHER: "true"
          PUBLIB_DRYRUN: ${{ inputs.dry_run }}
        run: npx -p publib@latest publib-npm
      - name: Extract Version
        id: extract-version
        if: ${{ failure() }}
        run: echo "VERSION=$(cat dist/version.txt)" >> $GITHUB_OUTPUT
        shell: bash
      - name: Create Issue
        id: create_issue
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.extract-version.outputs.VERSION }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: gh issue create --title "Publishing v$VERSION to npm failed" --body "See $RUN_URL" --label "failed-release"
  release_maven:
    name: Publish to Maven Central
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    environment: release
    if: needs.release.outputs.tag_exists != 'true' && needs.release.outputs.latest_commit == github.sha
    steps:
      - uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: "11"
      - uses: actions/setup-node@v6
        with:
          node-version: lts/-1
          package-manager-cache: "false"
      - name: Download build artifacts
        id: download_build_artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifact
          path: dist
      - name: Restore build artifact permissions
        id: restore_build_artifact_permissions
        run: cd dist && setfacl --restore=permissions-backup.acl
        continue-on-error: true
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6
        with:
          path: .repo
      - name: Install Dependencies
        id: install_dependencies
        run: cd .repo && npm ci
      - name: Extract build artifact
        id: extract_build_artifact
        run: tar --strip-components=1 -xzvf dist/js/*.tgz -C .repo
      - name: Move build artifact out of the way
        id: move_build_artifact_out_of_the_way
        run: mv dist dist.old
      - name: Create java artifact
        id: create_java_artifact
        run: cd .repo && node ./projen.js package:java
      - name: Collect java artifact
        id: collect_java_artifact
        run: mv .repo/dist dist
      - name: Release
        id: release
        env:
          MAVEN_SERVER_ID: central-ossrh
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PRIVATE_KEY_PASSPHRASE: ${{ secrets.MAVEN_GPG_PRIVATE_KEY_PASSPHRASE }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_STAGING_PROFILE_ID: ${{ secrets.MAVEN_STAGING_PROFILE_ID }}
          PUBLIB_DRYRUN: ${{ inputs.dry_run }}
        run: npx -p publib@latest publib-maven
      - name: Extract Version
        id: extract-version
        if: ${{ failure() }}
        run: echo "VERSION=$(cat dist/version.txt)" >> $GITHUB_OUTPUT
        shell: bash
      - name: Create Issue
        id: create_issue
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.extract-version.outputs.VERSION }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: gh issue create --title "Publishing v$VERSION to Maven Central failed" --body "See $RUN_URL" --label "failed-release"
  release_pypi:
    name: Publish to PyPI
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write
    environment: release
    if: needs.release.outputs.tag_exists != 'true' && needs.release.outputs.latest_commit == github.sha
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: lts/-1
          package-manager-cache: "false"
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Download build artifacts
        id: download_build_artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-artifact
          path: dist
      - name: Restore build artifact permissions
        id: restore_build_artifact_permissions
        run: cd dist && setfacl --restore=permissions-backup.acl
        continue-on-error: true
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6
        with:
          path: .repo
      - name: Install Dependencies
        id: install_dependencies
        run: cd .repo && npm ci
      - name: Extract build artifact
        id: extract_build_artifact
        run: tar --strip-components=1 -xzvf dist/js/*.tgz -C .repo
      - name: Move build artifact out of the way
        id: move_build_artifact_out_of_the_way
        run: mv dist dist.old
      - name: Create python artifact
        id: create_python_artifact
        run: cd .repo && node ./projen.js package:python
      - name: Collect python artifact
        id: collect_python_artifact
        run: mv .repo/dist dist
      - name: Release
        id: release
        env:
          PYPI_TRUSTED_PUBLISHER: "true"
