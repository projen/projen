name: dependency-review
on:
  pull_request: {}
  workflow_dispatch: {}
jobs:
  dependency-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          allow-licenses: MIT, ISC, BSD-2-Clause, BSD-3-Clause, Apache-2.0, Python-2.0
          comment-summary-in-pr: always
          warn-only: true
